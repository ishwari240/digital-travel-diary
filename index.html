<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Travel Gallery | Ishwari</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- NAVBAR -->
<header>
  <nav class="navbar">
    <h2>Travel Gallery</h2>
    <div>
      <a href="index.html">Home</a>
      <a href="destinations.html">Destinations</a>
      <a href="about.html">About</a>
    </div>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Explore The World</h1>
  <p>Discover beautiful destinations with immersive experiences</p>
</section>

<!-- GALLERY -->
<section class="gallery">

  <div class="card" onclick="openModal('paris')">
    <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34">
    <div class="overlay">Paris</div>
  </div>

  <div class="card" onclick="openModal('bali')">
    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
    <div class="overlay">Bali</div>
  </div>

  <div class="card" onclick="openModal('tokyo')">
    <img src="https://images.unsplash.com/photo-1549692520-acc6669e2f0c">
    <div class="overlay">Tokyo</div>
  </div>

</section>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-content">
    <span onclick="closeModal()" class="close">&times;</span>
    <h2 id="title"></h2>
    <p id="desc"></p>
  </div>
</div>

<footer>
  <p>© 2026 Ishwari | Travel Gallery</p>
</footer>

<script src="script.js"></script>

</body>
</html>
